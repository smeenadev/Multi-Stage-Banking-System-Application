server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8083
          predicates:
            - Path=/auth/**

        - id: loan-service
          uri: http://loan-service:8082
          predicates:
            - Path=/loan-service/**

        - id: user-service
          uri: http://user-service:8084
          predicates:
            - Path=/user-service/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

  endpoint:
    health:
      show-details: always